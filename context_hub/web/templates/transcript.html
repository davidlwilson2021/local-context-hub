{% extends "base.html" %}
{% block title %}Transcript — Context Hub{% endblock %}
{% block content %}
<div class="card">
  <h1>Transcript</h1>
  <div class="project-path">{{ transcript.path }}</div>
</div>
<div class="card">
  <pre style="white-space:pre-wrap;word-break:break-word;font-size:0.8rem;max-height:70vh;overflow:auto;">{% for line in transcript.lines %}{{ line }}
{% endfor %}</pre>
</div>
{% endblock %}
