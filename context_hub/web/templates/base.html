<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Context Hub{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 1.5rem;
        min-height: 100vh;
        background: #020617;
        color: #f9fafb;
      }
      h1, h2 { margin-top: 0; }
      a { color: #38bdf8; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .card {
        background: #020617;
        border-radius: 0.75rem;
        padding: 1rem 1.25rem;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.9);
        border: 1px solid #1e293b;
        margin-bottom: 1rem;
      }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th, td { padding: 0.4rem 0.5rem; text-align: left; }
      th { font-weight: 600; color: #9ca3af; border-bottom: 1px solid #1f2933; }
      .badge {
        display: inline-flex;
        border-radius: 999px;
        padding: 0.1rem 0.6rem;
        font-size: 0.75rem;
        background: #111827;
        border: 1px solid #38bdf8;
        color: #7dd3fc;
      }
      .timestamp { font-variant-numeric: tabular-nums; color: #9ca3af; font-size: 0.8rem; }
      .project-path { color: #9ca3af; font-size: 0.8rem; word-break: break-all; }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 1rem;
      }
      input, select, button {
        font: inherit;
        padding: 0.35rem 0.6rem;
        border-radius: 0.4rem;
        border: 1px solid #1e293b;
        background: #0f172a;
        color: #f9fafb;
      }
      button {
        cursor: pointer;
        background: #1d4ed8;
        border-color: #2563eb;
      }
      button:hover { background: #2563eb; }
      .nav { margin-bottom: 1rem; font-size: 0.9rem; color: #9ca3af; }
      .flash { padding: 0.5rem 0.75rem; border-radius: 0.5rem; background: #14532d; margin-bottom: 1rem; }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="nav"><a href="/">← Dashboard</a></div>
    {% block content %}{% endblock %}
  </body>
</html>
